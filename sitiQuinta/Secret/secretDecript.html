<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <link rel="icon" href="immagini/cryptIcon.png" type="image/x-icon">
        <title>Decripta</title>
    </head>
    <body background="immagini/sfondo.jpg">
        <div class="contenitore">
            <button class="back2" onclick="window.location.href='secretCript.html'"><b>Cripta un altro file</b></button>
            <h1>Decripta un file di testo</h1>
            <button class="pulsanteCripta" onclick="decripta()"><b>Decripta</b></button>
            <table id="tabellaTesto">
                <tbody>
                </tbody>
            </table>
        </div>
    </body>
    <script>
        // preleva la sequenza rsa dal local storage
        const sequenzaCifrata = JSON.parse(localStorage.getItem("SEQUENZA_RSA"));
        const corpoTabella = document.getElementById("tabellaTesto").getElementsByTagName("tbody")[0];
        let riga = corpoTabella.insertRow();
        riga.insertCell(0).textContent = sequenzaCifrata.join(" ");
        // funzione asincrona che descripta il messaggio tramite chiave privata utilizzando la fetch
        async function decripta() {
            const risposta = await fetch("chiave_privata.json");
            const chiavePrivata = await risposta.json();
            const esponentePrivato = chiavePrivata.d;
            const modulo = chiavePrivata.n;
            let testoDecifrato = "";
            for (let valoreCifrato of sequenzaCifrata) {
                let codiceASCII = potenzaModulare(valoreCifrato, esponentePrivato, modulo);
                testoDecifrato += String.fromCharCode(codiceASCII);
            }

            riga.insertCell(1).textContent = testoDecifrato;
        }
        // funzione di potenza modulare per RSA
        function potenzaModulare(base, esponente, modulo) {
            let risultato = 1;
            base = base % modulo;

            while (esponente > 0) {
                if (esponente % 2 === 1) {
                    risultato = (risultato * base) % modulo;
                }
                esponente = Math.floor(esponente / 2);
                base = (base * base) % modulo;
            }
            return risultato;
        }
        </script>
</html>
