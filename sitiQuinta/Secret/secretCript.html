<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <link rel="icon" href="immagini/cryptIcon.png" type="image/x-icon">
        <title>Cripta</title>
    </head>
    <body background="immagini/sfondo.jpg">
        <div class="contenitore">
            <a href="../home2.html"><img src="immagini/backIcon.png" class="back" alt="Torna Indietro" width="40px" height="40px"></a>
            <h1>Cripta un file di testo</h1><br>
            <input type="text" id="inputTesto" class="inputChiave" placeholder="Inserisci messaggio da cifrare" style="margin-left: 0px;">
            <button class="pulsanteCripta" onclick="cripta()"><b>Cripta</b></button>
        </div>
    </body>
    <script>
        // funzione asincrona che cripta il messaggio tramite chiave pubblica utilizzando la fetch
        async function cripta() {
            const testoInChiaro = document.getElementById("inputTesto").value;
            if (testoInChiaro.length === 0) {
                alert("Inserisci una frase da cifrare");
                return;
            }
            const risposta = await fetch("chiavi_pubbliche.json");
            const chiavePubblica = await risposta.json();
            const esponentePubblico = chiavePubblica.e;
            const modulo = chiavePubblica.n;
            let sequenzaCifrata = [];
            for (let i = 0; i < testoInChiaro.length; i++) {
                let codiceASCII = testoInChiaro.charCodeAt(i);
                let valoreCifrato = potenzaModulare(codiceASCII, esponentePubblico, modulo);
                sequenzaCifrata.push(valoreCifrato);
            }
            localStorage.setItem("SEQUENZA_RSA", JSON.stringify(sequenzaCifrata));
            window.location.href = "secretDecript.html";
        }
        // funzione di potenza modulare per RSA
        function potenzaModulare(base, esponente, modulo) {
            let risultato = 1;
            base = base % modulo;

            while (esponente > 0) {
                if (esponente % 2 === 1) {
                    risultato = (risultato * base) % modulo;
                }
                esponente = Math.floor(esponente / 2);
                base = (base * base) % modulo;
            }
            return risultato;
        }
    </script>
</html>
